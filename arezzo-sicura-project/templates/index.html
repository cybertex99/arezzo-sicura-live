<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AREZZO SICURA - Tactical Dashboard</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --neon-red: #ff3b3b;
            --dark-bg: #0a0a0a;
            --panel-bg: rgba(20, 20, 20, 0.9);
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Top Bar & Ticker */
        header {
            background: #1a1a1a;
            border-bottom: 2px solid var(--neon-red);
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ticker-wrap {
            background: maroon;
            color: white;
            padding: 5px;
            overflow: hidden;
            white-space: nowrap;
        }

        .ticker-content {
            display: inline-block;
            animation: ticker 30s linear infinite;
        }

        @keyframes ticker {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* Layout Principale */
        .main-container {
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            flex-grow: 1;
            gap: 10px;
            padding: 10px;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid #333;
            padding: 15px;
            overflow-y: auto;
        }

        #map {
            width: 100%;
            height: 100%;
            border: 1px solid #444;
            background: #000;
        }

        .feed-item {
            font-size: 0.85em;
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 1px solid #222;
        }

        .stat-bar {
            height: 20px;
            background: #222;
            margin: 10px 0;
            position: relative;
        }

        .stat-fill {
            height: 100%;
            transition: width 1s ease-in-out;
        }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; color: var(--neon-red);">🛡️ AREZZO SICURA - LIVE AGGREGATOR</div>
    <div id="clock">{{ data_oggi }}</div>
</header>

<div class="ticker-wrap">
    <div class="ticker-content" id="news-ticker">Caricamento news in corso dalle testate di Arezzo...</div>
</div>

<div class="main-container">
    <div class="panel">
        <h3 style="color: cyan; border-bottom: 1px solid cyan;">📡 LIVE SOCIAL FEEDS</h3>
        <div id="social-list">Attendere sincronizzazione...</div>
    </div>

    <div id="map"></div>

    <div class="panel">
        <h3 style="color: #ffcc00; border-bottom: 1px solid #ffcc00;">📊 ANALISI RISCHIO</h3>
        <div id="stats-list"></div>
        
        <div style="margin-top: 30px; border: 1px dotted red; padding: 10px;">
            <small>PROTOCOLLO SICUREZZA:</small><br>
            <strong>STATO: ATTENZIONE</strong>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // Inizializzazione Mappa focalizzata su Arezzo
    const map = L.map('map', { zoomControl: false }).setView([43.463, 11.878], 11);
    
    // Tiles Dark Mode (CartoDB DarkMatter)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    async function updateDashboard() {
        try {
            const response = await fetch('/api/updates');
            const data = await response.json();

            // 1. Aggiorna Ticker News
            const ticker = document.getElementById('news-ticker');
            if (data.ticker_news.length > 0) {
                ticker.innerHTML = data.ticker_news.map(n => 
                    ` • <strong>${n.fonte}</strong>: ${n.titolo}`
                ).join(' ');
            }

            // 2. Aggiorna Social Feed (Sinistra)
            const socialList = document.getElementById('social-list');
            socialList.innerHTML = data.social_feed.map(s => `
                <div class="feed-item" style="border-left: 3px solid ${s.colore}; padding-left: 8px;">
                    <span style="color: ${s.colore}; font-weight: bold;">${s.tipo}</span><br>
                    <small>${s.comune}</small><br>
                    ${s.testo}
                </div>
            `).join('');

            // 3. Aggiorna Statistiche (Destra)
            const statsList = document.getElementById('stats-list');
            statsList.innerHTML = data.stats.map(st => `
                <div style="font-size: 0.8em; margin-top:10px;">${st.label} (Livello: ${st.valore})</div>
                <div class="stat-bar">
                    <div class="stat-fill" style="width: ${st.valore * 10}%; background: ${st.color};"></div>
                </div>
            `).join('');

            // 4. Aggiorna Marker sulla Mappa
            // Puliamo i marker precedenti (opzionale) e aggiungiamo i nuovi
            data.social_feed.forEach(point => {
                L.circleMarker([point.lat, point.lon], {
                    color: point.colore,
                    radius: 8,
                    fillOpacity: 0.8
                }).addTo(map).bindPopup(`<b>${point.comune}</b><br>${point.testo}`);
            });

        } catch (error) {
            console.error("Errore sincronizzazione dati:", error);
        }
    }

    // Carica dati subito e poi ogni 60 secondi
    updateDashboard();
    setInterval(updateDashboard, 60000);
</script>

</body>
</html>
