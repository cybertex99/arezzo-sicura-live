<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AREZZO SICURA - Tactical Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { 
            --bg: #05070a; --panel: #0d1117; --red: #8b0000; 
            --bright-red: #ff4d4d; --cyan: #00e5ff; --gold: #d4af37; --text: #cbd5e0; 
        }

        body { 
            margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; 
            background: var(--bg); color: var(--text); height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden; 
        }

        /* Header Superiore */
        header { 
            background: #1a2a40; padding: 10px 20px; display: flex; 
            justify-content: space-between; align-items: center; border-bottom: 2px solid #0056b3; 
        }
        .brand { font-weight: bold; font-size: 1.1em; letter-spacing: 1px; }
        .brand span { color: var(--bright-red); }

        /* Ticker News Reali (Rosso) */
        .news-ticker { 
            background: var(--red); height: 45px; display: flex; 
            align-items: center; border-bottom: 1px solid #000; overflow: hidden; 
        }
        .ticker-wrap { display: inline-block; white-space: nowrap; animation: scroll 60s linear infinite; }
        .news-item { 
            display: inline-flex; align-items: center; margin-right: 50px; 
            font-size: 0.85em; color: #fff; font-weight: 500;
        }
        .news-item b { color: #ffeb3b; margin-right: 8px; text-transform: uppercase; }

        @keyframes scroll { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        /* Layout Principale */
        .main-container { 
            display: grid; grid-template-columns: 320px 1fr 300px; 
            flex-grow: 1; gap: 8px; padding: 8px; background: #000; 
        }
        .panel { 
            background: var(--panel); border: 1px solid #2d3d50; 
            display: flex; flex-direction: column; overflow: hidden; 
        }
        .panel-header { 
            background: rgba(0,0,0,0.5); padding: 10px; font-size: 0.8em; 
            font-weight: bold; color: var(--cyan); border-bottom: 1px solid #2d3d50; 
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* Mappa */
        #map { background: #080a0f; flex-grow: 1; }

        /* Social Feed */
        .feed-list { overflow-y: auto; padding: 10px; flex-grow: 1; }
        .feed-card { 
            background: #1c2a3d; border-radius: 4px; padding: 12px; 
            margin-bottom: 10px; border-left: 4px solid #444; font-size: 0.85em; 
        }
        
        /* Grafico a Barre (Analisi Rischio) */
        .chart-area { 
            height: 200px; display: flex; align-items: flex-end; 
            justify-content: space-around; padding: 20px 10px; 
        }
        .bar-container { display: flex; flex-direction: column; align-items: center; width: 15%; height: 100%; justify-content: flex-end; }
        .bar-fill { width: 100%; border-radius: 2px 2px 0 0; position: relative; transition: height 1s; }
        .bar-label { font-size: 0.6em; transform: rotate(-45deg); margin-top: 25px; white-space: nowrap; color: #a0b0c0; }
        .bar-val { font-size: 0.7em; font-weight: bold; margin-bottom: 4px; }

        /* Link Protocollo */
        .links { padding: 10px; }
        .link-btn { 
            display: block; background: rgba(0,229,255,0.05); color: #cbd5e0; 
            padding: 10px; margin-bottom: 8px; border: 1px solid #3d4d60; 
            text-decoration: none; font-size: 0.8em; text-align: center; border-radius: 4px;
        }
        .link-btn:hover { border-color: var(--cyan); background: rgba(0,229,255,0.1); }

        /* Effetti Radar Marker */
        .radar { width: 12px; height: 12px; border-radius: 50%; position: relative; }
        .radar::after { 
            content: ""; position: absolute; width: 100%; height: 100%; 
            border-radius: 50%; border: 2px solid white; animation: pulse 2s infinite; 
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }

        /* Pulsante Emergenza */
        .sos-btn { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            background: linear-gradient(to bottom, #ff4b2b, #ff416c); color: white; 
            padding: 12px 40px; border-radius: 30px; font-weight: bold; 
            text-decoration: none; z-index: 1000; border: 2px solid #fff; 
            box-shadow: 0 0 20px rgba(255,0,0,0.5); 
        }
    </style>
</head>
<body>

<header>
    <div class="brand">🛡️ AREZZO SICURA <span>- TOC LIVE AGGREGATOR</span></div>
    <div id="date-display" style="font-weight: bold; color: var(--cyan);">{{ data_oggi }}</div>
</header>

<div class="news-ticker">
    <div class="ticker-wrap" id="ticker-content">
        </div>
</div>

<div class="main-container">
    <div class="panel">
        <div class="panel-header">📱 LIVE SOCIAL FEEDS (X, FB, TG)</div>
        <div class="feed-list" id="social-feed"></div>
    </div>

    <div id="map"></div>

    <div class="panel">
        <div class="panel-header">📊 ANALISI LOGISTICA (RISCHIO)</div>
        <div class="chart-area" id="risk-chart"></div>
        
        <div class="panel-header" style="margin-top:10px;">⚖️ PROTOCOLLO SICUREZZA</div>
        <div class="links">
            <a href="https://www.carabinieri.it" target="_blank" class="link-btn">CARABINIERI: Difesa Passiva</a>
            <a href="https://questure.poliziadistato.it" target="_blank" class="link-btn">POLIZIA: Consigli Antifurto</a>
        </div>
    </div>
</div>

<a href="tel:112" class="sos-btn">🚨 EMERGENZA 112</a>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Inizializzazione Mappa Dark
    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([43.46, 11.88], 10);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    function updateDashboard() {
        fetch('/api/updates')
            .then(res => res.json())
            .then(data => {
                // 1. Aggiornamento Ticker News Reali
                document.getElementById('ticker-content').innerHTML = data.ticker_news.map(n => `
                    <span class="news-item"><b>[${n.fonte}]</b> ${n.titolo}</span>
                `).join('');

                // 2. Aggiornamento Social Feed
                document.getElementById('social-feed').innerHTML = data.social_feed.map(s => `
                    <div class="feed-card" style="border-left-color: ${s.colore}">
                        <b style="color: var(--cyan)">${s.tipo} | ${s.comune}</b><br>
                        <span style="color: #eee">${s.testo}</span>
                    </div>
                `).join('');

                // 3. Aggiornamento Grafico a Barre
                document.getElementById('risk-chart').innerHTML = data.stats.map(st => `
                    <div class="bar-container">
                        <span class="bar-val">${st.valore}</span>
                        <div class="bar-fill" style="height: ${st.valore * 10}%; background: ${st.color}; box-shadow: 0 0 10px ${st.color}66;"></div>
                        <span class="bar-label">${st.label}</span>
                    </div>
                `).join('');

                // 4. Aggiornamento Mappa (Marker e Vettori)
                map.eachLayer(l => { if(l instanceof L.Marker || l instanceof L.Polyline || l instanceof L.CircleMarker) map.removeLayer(l); });

                data.social_feed.forEach(s => {
                    const start = [s.lat, s.lon];
                    const end = [s.dest_lat, s.dest_lon];
                    
                    // Icona Radar Pulsante
                    const radarIcon = L.divIcon({
                        className: '',
                        html: `<div class="radar" style="background: ${s.colore}"></div>`,
                        iconSize: [12, 12], iconAnchor: [6, 6]
                    });

                    L.marker(start, { icon: radarIcon }).addTo(map);

                    // Linea Vettoriale di Movimento
                    if(s.dest_lat) {
                        L.polyline([start, end], {
                            color: s.colore, weight: 3, dashArray: '8, 12', opacity: 0.7
                        }).addTo(map);
                        L.circleMarker(end, { radius: 3, color: s.colore, fillOpacity: 1 }).addTo(map);
                    }
                });
            });
    }

    // Avvio e Aggiornamento automatico ogni 60 secondi
    updateDashboard();
    setInterval(updateDashboard, 60000);
</script>

</body>
</html>
