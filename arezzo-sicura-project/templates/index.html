<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>AREZZO SICURA | GLOBAL & LOCAL AGGREGATOR</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #0a0d14; --panel: #141b26; --red: #ff3b30; --blue: #007aff; --war-orange: #ff9500; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { background: #111821; padding: 12px 20px; display: flex; justify-content: space-between; border-bottom: 1px solid #2c3e50; align-items: center; }
        .news-banner { background: #2a0505; height: 40px; display: flex; align-items: center; overflow: hidden; border-bottom: 2px solid var(--red); }
        .news-track { display: flex; white-space: nowrap; animation: scroll 80s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .news-item { padding: 0 50px; font-weight: bold; font-size: 0.85em; color: #ffcccc; letter-spacing: 1px; }

        .dashboard { display: grid; grid-template-columns: 380px 1fr 320px; gap: 10px; padding: 10px; flex-grow: 1; height: calc(100vh - 110px); }
        .col { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }

        .card { background: #1c2533; padding: 15px; border-radius: 4px; border: 1px solid #232d3b; position: relative; border-left: 4px solid var(--blue); }
        .card.war { border-left-color: var(--war-orange); }
        
        #map { background: #0b111a; border-radius: 4px; border: 1px solid #232d3b; height: 100%; }
        .status-badge { position: absolute; top: 10px; right: 10px; font-size: 10px; background: rgba(0,0,0,0.5); padding: 2px 6px; border-radius: 3px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:bold; font-size:1.2em; display:flex; align-items:center; gap:10px;">
        <span style="color:var(--red)">● LIVE</span> AGGREGATORE SICUREZZA
    </div>
    <div id="clock" style="font-family:monospace; color:var(--blue);"></div>
</header>

<div class="news-banner">
    <div class="news-track" id="ticker">Caricamento flussi notizie...</div>
</div>

<div class="dashboard">
    <div class="col" id="social-col">
        <div style="font-size: 0.75em; color: #666; font-weight: bold; text-transform: uppercase;">Streaming Post (X & Telegram)</div>
        </div>

    <div id="map"></div>

    <div class="col">
        <div class="card" style="border-left-color: var(--red);">
            <div style="font-weight:bold; font-size:0.8em; margin-bottom:10px;">☢️ LIVE WAR MONITOR</div>
            <div style="font-size:0.85em; line-height:1.4;">Livello allerta globale: <span style="color:var(--war-orange)">ELEVATO</span><br>Aggiornamenti: 12 nuovi post/min</div>
        </div>
        
        <div class="card" style="margin-top:auto;">
            <div style="font-weight:bold; font-size:0.8em; margin-bottom:10px; color:var(--blue);">📍 SICUREZZA AREZZO</div>
            <div style="font-size:0.8em;">Varchi autostradali: Monitorati<br>Pattuglie attive: 14<br>Status: Regolare</div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', {zoomControl: false}).setView([43.46, 11.88], 11);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    async function updateData() {
        try {
            const r = await fetch('/api/updates');
            const d = await r.json();
            
            // News Ticker
            document.getElementById('ticker').innerHTML = d.ticker.map(t => `<span class="news-item">${t}</span>`).join('').repeat(2);
            
            // Social Column
            document.getElementById('social-col').innerHTML = d.social.map(s => `
                <div class="card ${s.piattaforma.includes('GUERRA') ? 'war' : ''}">
                    <span class="status-badge">${s.time}</span>
                    <div style="color:var(--blue); font-weight:bold; font-size:10px; margin-bottom:5px;">${s.piattaforma} | ${s.autore}</div>
                    <div style="font-size:13px; line-height:1.4;">${s.testo}</div>
                </div>
            `).join('');
            
        } catch(e) { console.log("Errore aggiornamento flussi"); }
    }

    setInterval(() => {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('it-IT');
    }, 1000);

    updateData();
    setInterval(updateData, 60000);
</script>
</body>
</html>
