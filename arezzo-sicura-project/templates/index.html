<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AREZZO SICURA - Tactical Dashboard</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --neon-red: #ff3b3b;
            --dark-bg: #0a0a0a;
            --panel-bg: rgba(20, 20, 20, 0.95);
            --accent-blue: #00f2ff;
        }

        body {
            background-color: var(--dark-bg);
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Intestazione */
        header {
            background: #111;
            border-bottom: 2px solid var(--neon-red);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Ticker delle News */
        .ticker-wrap {
            background: #600;
            height: 30px;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .ticker-content {
            white-space: nowrap;
            display: inline-block;
            padding-left: 100%;
            animation: ticker 40s linear infinite;
            font-weight: bold;
            font-size: 0.9em;
        }

        @keyframes ticker {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-200%, 0, 0); }
        }

        /* Layout */
        .main-layout {
            display: grid;
            grid-template-columns: 320px 1fr 300px;
            flex-grow: 1;
            gap: 5px;
            padding: 5px;
            background: #000;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
            padding: 15px;
            overflow-y: auto;
        }

        .panel-title {
            color: var(--accent-blue);
            border-bottom: 1px solid var(--accent-blue);
            margin-bottom: 15px;
            padding-bottom: 5px;
            font-size: 0.9em;
            font-weight: bold;
        }

        /* Contenitore Mappa */
        #map {
            background: #000;
            border: 1px solid #333;
        }

        /* Stile Feed Social */
        .feed-item {
            background: rgba(255,255,255,0.03);
            margin-bottom: 10px;
            padding: 10px;
            font-size: 0.8em;
            border-radius: 2px;
        }

        /* Barre Statistiche */
        .stat-container { margin-bottom: 15px; }
        .stat-label { font-size: 0.75em; margin-bottom: 5px; }
        .stat-bar { height: 8px; background: #222; border-radius: 4px; overflow: hidden; }
        .stat-fill { height: 100%; transition: width 1.5s ease-out; }

        /* Scrollbar sottile */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>

<header>
    <div style="color: var(--neon-red); font-weight: bold;">TOC LIVE AGGREGATOR - AREZZO SICURA</div>
    <div id="date-display">{{ data_oggi }}</div>
</header>

<div class="ticker-wrap">
    <div class="ticker-content" id="news-ticker">Sincronizzazione con le testate locali in corso...</div>
</div>

<div class="main-layout">
    <div class="panel">
        <div class="panel-title">LIVE SOCIAL FEEDS (X, FB, TG)</div>
        <div id="social-list">In attesa di dati...</div>
    </div>

    <div id="map"></div>

    <div class="panel">
        <div class="panel-title">ANALISI LOGISTICA (RISCHIO)</div>
        <div id="stats-list">Calcolo indici in corso...</div>
        
        <div style="margin-top: auto; padding: 10px; border: 1px solid var(--neon-red); color: var(--neon-red); font-size: 0.8em; text-align: center;">
            <strong>PROTOCOLLO ATTIVO</strong><br>Monitoraggio H24
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // 1. Inizializza Mappa
    const map = L.map('map', { zoomControl: false }).setView([43.463, 11.878], 11);
    
    // Tema Scuro per la Mappa
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // 2. Funzione Principale di Aggiornamento
    async function fetchData() {
        try {
            console.log("Richiesta dati al server...");
            const response = await fetch('/api/updates');
            const data = await response.json();

            // Aggiorna Ticker News
            const ticker = document.getElementById('news-ticker');
            if (data.ticker_news && data.ticker_news.length > 0) {
                ticker.innerHTML = data.ticker_news.map(n => 
                    ` +++ <strong>${n.fonte}</strong>: ${n.titolo}`
                ).join(' ');
            }

            // Aggiorna Feed Social
            const socialList = document.getElementById('social-list');
            socialList.innerHTML = data.social_feed.map(s => `
                <div class="feed-item" style="border-left: 3px solid ${s.colore}">
                    <div style="color:${s.colore}; font-weight:bold; font-size:10px;">${s.tipo} - ${s.comune}</div>
                    <div>${s.testo}</div>
                </div>
            `).join('');

            // Aggiorna Statistiche
            const statsList = document.getElementById('stats-list');
            statsList.innerHTML = data.stats.map(st => `
                <div class="stat-container">
                    <div class="stat-label">${st.label} (Indice: ${st.valore})</div>
                    <div class="stat-bar">
                        <div class="stat-fill" style="width: ${st.valore * 10}%; background: ${st.color}"></div>
                    </div>
                </div>
            `).join('');

            // Aggiorna Marker Mappa
            data.social_feed.forEach(point => {
                L.circleMarker([point.lat, point.lon], {
                    color: point.colore,
                    radius: 7,
                    fillOpacity: 0.6
                }).addTo(map).bindPopup(`<b>${point.comune}</b><br>${point.testo}`);
            });

        } catch (error) {
            console.error("Errore nel recupero dati:", error);
        }
    }

    // Esegui subito e poi ogni minuto
    fetchData();
    setInterval(fetchData, 60000);
</script>

</body>
</html>
