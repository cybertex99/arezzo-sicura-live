<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AREZZO SICURA - Aggregatore Sicurezza</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-dark: #0a0d14;
            --panel-bg: #141b26;
            --accent-red: #ff3b30;
            --accent-blue: #007aff;
            --text-gray: #a0a0a0;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* HEADER */
        header {
            background: #1a222f;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #2c3e50;
        }

        /* NEWS CAROUSEL (Top Banner) */
        .news-banner {
            background: #4a0e0e;
            height: 60px;
            display: flex;
            align-items: center;
            overflow: hidden;
            border-bottom: 2px solid var(--accent-red);
        }

        .news-track {
            display: flex;
            white-space: nowrap;
            animation: scroll 120s linear infinite;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .news-item {
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-right: 1px solid #601a1a;
        }

        .news-item img { height: 30px; margin-right: 10px; border-radius: 3px; }

        /* LAYOUT */
        .dashboard-container {
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            gap: 15px;
            padding: 15px;
            flex-grow: 1;
        }

        .panel {
            background: var(--panel-bg);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            border: 1px solid #2c3e50;
        }

        .panel-header {
            color: var(--accent-blue);
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85em;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        /* SOCIAL FEED (Left) */
        .social-item {
            background: #1e2736;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        /* MAPPA (Center) */
        #map-container { position: relative; border-radius: 8px; overflow: hidden; }
        #map { height: 100%; width: 100%; background: #0b111a; }
        
        .map-overlay-btn {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: radial-gradient(circle, #ff3b30 0%, #800 100%);
            padding: 15px 40px; border-radius: 50px;
            font-weight: bold; text-decoration: none; color: white;
            box-shadow: 0 0 20px rgba(255,0,0,0.5);
            z-index: 1000;
        }

        /* GRAFICI (Right) */
        .bar-container { margin-top: 10px; }
        .bar-row { margin-bottom: 12px; }
        .bar-label { font-size: 0.75em; display: flex; justify-content: space-between; margin-bottom: 4px; }
        .bar-bg { background: #2c3e50; height: 10px; border-radius: 5px; overflow: hidden; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, #f1c40f, #e67e22); }

        /* FOOTER LINKS */
        .footer-links {
            margin-top: auto;
            border-top: 1px solid #2c3e50;
            padding-top: 15px;
        }
        .link-item {
            display: block; color: #ecf0f1; text-decoration: none;
            padding: 8px 0; font-size: 0.85em;
        }
    </style>
</head>
<body>

<header>
    <div style="font-weight:bold; font-size:1.2em;">🛡️ AREZZO SICURA <span style="font-weight:normal; color:var(--text-gray);"> - AGGREGATORE SICUREZZA TERRITORIALE</span> <span style="color:var(--accent-red)">(LIVE)</span></div>
    <div id="clock">GIOVEDÌ 5 MARZO 2026</div>
</header>

<div class="news-banner">
    <div class="news-track" id="news-track">
        </div>
</div>

<div class="dashboard-container">
    <div class="panel">
        <div class="panel-header">📱 SOCIAL STREAM (LIVE FEED)</div>
        <div id="social-feed"></div>
    </div>

    <div id="map-container" class="panel" style="padding:0;">
        <div id="map"></div>
        <a href="tel:112" class="map-overlay-btn">🚨 CHIAMATA DI EMERGENZA 112</a>
    </div>

    <div class="panel">
        <div class="panel-header">📊 ANALISI LOGISTICA (PERMEABILITÀ)</div>
        <div style="font-size:0.8em; text-align:center; margin-bottom:10px;">TOP 5 RISCHIO EVASIONE</div>
        <div id="stats-bars"></div>

        <div class="footer-links">
            <div class="panel-header">⚖️ PROTOCOLLO DIFESA ATTIVA</div>
            <a href="#" class="link-item">🛡️ Carabinieri: Guida Difesa Passiva</a>
            <a href="#" class="link-item">🛡️ Polizia di Stato: Sicurezza in Casa</a>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', {zoomControl: false}).setView([43.463, 11.878], 10);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    async function refreshData() {
        const res = await fetch('/api/updates');
        const data = await res.json();

        // 1. News Banner
        const track = document.getElementById('news-track');
        const newsHtml = data.ticker_news.map(n => `
            <div class="news-item">
                <strong>${n.fonte}</strong>: ${n.titolo}
            </div>
        `).join('');
        track.innerHTML = newsHtml + newsHtml; // Duplicato per loop infinito

        // 2. Social Feed
        document.getElementById('social-feed').innerHTML = data.social_feed.map(s => `
            <div class="social-item">
                <div style="color:var(--accent-blue); font-size:0.8em; margin-bottom:3px;">${s.tipo}: ${s.comune}</div>
                <div>${s.testo}</div>
                <div style="color:var(--text-gray); font-size:0.7em; margin-top:5px;">— ${s.data_ora}</div>
            </div>
        `).join('');

        // 3. Stats Bars
        document.getElementById('stats-bars').innerHTML = data.stats.map(st => `
            <div class="bar-row">
                <div class="bar-label"><span>${st.label}</span><span>${st.valore}</span></div>
                <div class="bar-bg"><div class="bar-fill" style="width:${st.valore * 10}%"></div></div>
            </div>
        `).join('');
    }

    refreshData();
    setInterval(refreshData, 60000);
</script>
</body>
</html>
