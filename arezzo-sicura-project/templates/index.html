<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>AREZZO SICURA - TOC</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg-dark: #0a0d14; --panel-bg: #141b26; --accent-red: #ff3b30; --accent-blue: #007aff; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        header { background: #1a222f; padding: 10px 20px; display: flex; justify-content: space-between; border-bottom: 2px solid #2c3e50; }
        
        /* News Banner */
        .news-banner { background: #4a0e0e; height: 50px; display: flex; align-items: center; overflow: hidden; border-bottom: 2px solid var(--accent-red); }
        .news-track { display: flex; white-space: nowrap; animation: scroll 100s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .news-item { padding: 0 30px; font-weight: bold; font-size: 0.9em; border-right: 1px solid #601a1a; }

        .dashboard-container { display: grid; grid-template-columns: 320px 1fr 320px; gap: 10px; padding: 10px; flex-grow: 1; }
        .panel { background: var(--panel-bg); border-radius: 8px; padding: 15px; border: 1px solid #2c3e50; overflow-y: auto; }
        
        /* Social Clickable */
        .social-item { background: #1e2736; padding: 10px; border-radius: 6px; margin-bottom: 10px; text-decoration: none; color: white; display: block; border-left: 3px solid var(--accent-blue); transition: 0.2s; }
        .social-item:hover { background: #2a364a; }

        #map-container { position: relative; border-radius: 8px; overflow: hidden; background: #0b111a; }
        #map { height: 100%; width: 100%; }
        
        .map-overlay-btn { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: radial-gradient(circle, #ff3b30 0%, #800 100%); padding: 12px 30px; border-radius: 50px; font-weight: bold; color: white; text-decoration: none; z-index: 1000; box-shadow: 0 0 15px red; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:bold;">🛡️ AREZZO SICURA - AGGREGATORE LIVE</div>
    <div id="clock">GIOVEDÌ 5 MARZO 2026</div>
</header>

<div class="news-banner">
    <div class="news-track" id="news-track"></div>
</div>

<div class="dashboard-container">
    <div class="panel" id="social-feed"></div>
    
    <div id="map-container">
        <div id="map"></div>
        <a href="tel:112" class="map-overlay-btn">🚨 EMERGENZA 112</a>
    </div>

    <div class="panel" id="stats-panel">
        <div style="color:var(--accent-blue); font-weight:bold; margin-bottom:15px;">📊 ANALISI PERMEABILITÀ</div>
        <div id="stats-bars"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-polyline-decorator@1.6.0/dist/leaflet.polylineDecorator.js"></script>

<script>
    const map = L.map('map', {zoomControl: false}).setView([43.463, 11.878], 11);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    // FUNZIONE PER DISEGNARE LE FRECCE DELLE VIE DI FUGA
    function drawEscapeRoutes() {
        const routes = [
            { from: [43.463, 11.878], to: [43.518, 11.770], label: "A1 BATTIFOLLE", color: "red" },
            { from: [43.463, 11.878], to: [43.410, 11.950], label: "SENTIERI SUD", color: "yellow" }
        ];

        routes.forEach(r => {
            const line = L.polyline([r.from, r.to], {color: r.color, weight: 3, dashArray: '5, 10'}).addTo(map);
            L.polylineDecorator(line, {
                patterns: [{offset: '100%', repeat: 0, symbol: L.Symbol.arrowHead({pixelSize: 15, polygon: false, pathOptions: {stroke: true, color: r.color}})}]
            }).addTo(map);
        });
    }
    drawEscapeRoutes();

    async function refreshData() {
        const res = await fetch('/api/updates');
        const data = await res.json();

        // News Ticker
        const track = document.getElementById('news-track');
        const newsHtml = data.ticker_news.map(n => `<div class="news-item">🚨 ${n.fonte}: ${n.titolo}</div>`).join('');
        track.innerHTML = newsHtml + newsHtml;

        // Social Feed Cliccabile
        document.getElementById('social-feed').innerHTML = data.social_feed.map(s => `
            <a href="${s.link}" target="_blank" class="social-item">
                <div style="color:var(--accent-blue); font-size:0.75em;">${s.tipo} | ${s.comune}</div>
                <div style="font-size:0.85em; margin-top:5px;">${s.testo}</div>
                <div style="font-size:0.7em; color:gray; margin-top:5px;">${s.data_ora}</div>
            </a>
        `).join('');

        // Stats
        document.getElementById('stats-bars').innerHTML = data.stats.map(st => `
            <div style="margin-bottom:10px;">
                <div style="font-size:0.7em; display:flex; justify-content:space-between;"><span>${st.label}</span><span>${st.valore}</span></div>
                <div style="background:#2c3e50; height:8px; border-radius:4px; overflow:hidden; margin-top:3px;">
                    <div style="width:${st.valore*10}%; height:100%; background:linear-gradient(90deg, #f1c40f, #e67e22);"></div>
                </div>
            </div>
        `).join('');
    }

    refreshData();
    setInterval(refreshData, 60000);
</script>
</body>
</html>
