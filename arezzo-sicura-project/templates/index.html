<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AREZZO SICURA - Tactical Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --neon-red: #ff3b3b;
            --dark-bg: #0a0a0a;
            --panel-bg: rgba(20, 20, 20, 0.95);
            --accent-blue: #00f2ff;
        }

        body {
            background-color: var(--dark-bg);
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background: #111;
            border-bottom: 2px solid var(--neon-red);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* TICKER RALLENTATO */
        .ticker-wrap {
            background: #600;
            height: 35px;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .ticker-content {
            white-space: nowrap;
            display: inline-block;
            padding-left: 100%;
            animation: ticker 100s linear infinite; /* Rallentato a 100 secondi */
            font-weight: bold;
            font-size: 1.1em;
        }

        @keyframes ticker {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-300%, 0, 0); }
        }

        .main-layout {
            display: grid;
            grid-template-columns: 320px 1fr 300px;
            flex-grow: 1;
            gap: 5px;
            padding: 5px;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
            padding: 15px;
            overflow-y: auto;
        }

        .panel-title {
            color: var(--accent-blue);
            border-bottom: 1px solid var(--accent-blue);
            margin-bottom: 15px;
            padding-bottom: 5px;
            font-size: 0.9em;
            font-weight: bold;
        }

        #map { background: #000; border: 1px solid #333; }

        /* PULSANTI FORZE DELL'ORDINE */
        .police-btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: #1a1a1a;
            color: white;
            border: 1px solid #444;
            text-decoration: none;
            text-align: center;
            font-size: 0.8em;
            transition: 0.3s;
        }

        .police-btn:hover {
            background: #333;
            border-color: var(--accent-blue);
        }

        .stat-bar { height: 8px; background: #222; border-radius: 4px; overflow: hidden; margin-top: 5px;}
        .stat-fill { height: 100%; transition: width 1.5s ease-out; }
    </style>
</head>
<body>

<header>
    <div style="color: var(--neon-red); font-weight: bold;">TOC LIVE AGGREGATOR - AREZZO SICURA</div>
    <div id="date-display">{{ data_oggi }}</div>
</header>

<div class="ticker-wrap">
    <div class="ticker-content" id="news-ticker">Sincronizzazione...</div>
</div>

<div class="main-layout">
    <div class="panel">
        <div class="panel-title">LIVE SOCIAL FEEDS</div>
        <div id="social-list"></div>
    </div>

    <div id="map"></div>

    <div class="panel">
        <div class="panel-title">PROTOCOLLO SICUREZZA</div>
        <a href="https://www.carabinieri.it/" target="_blank" class="police-btn">CARABINIERI: Difesa Passiva</a>
        <a href="https://www.poliziadistato.it/" target="_blank" class="police-btn">POLIZIA: Consigli Antifurto</a>
        
        <div class="panel-title" style="margin-top:20px;">ANALISI LOGISTICA</div>
        <div id="stats-list"></div>
        
        <div style="margin-top: auto; padding: 15px; border: 2px solid var(--neon-red); color: var(--neon-red); font-weight: bold; text-align: center;">
            <a href="tel:112" style="color:red; text-decoration:none;">EMERGENZA 112</a>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: true }).setView([43.463, 11.878], 12);
    
    // LAYER STRADALE (Migliore per vie di fuga rispetto al Dark puro)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: 'OSM'
    }).addTo(map);

    async function fetchData() {
        try {
            const response = await fetch('/api/updates');
            const data = await response.json();

            document.getElementById('news-ticker').innerHTML = data.ticker_news.map(n => 
                ` +++ <strong>${n.fonte}</strong>: ${n.titolo}`
            ).join(' ');

            document.getElementById('social-list').innerHTML = data.social_feed.map(s => `
                <div style="border-left:3px solid ${s.colore}; padding:5px; margin-bottom:10px; background:rgba(255,255,255,0.05);">
                    <small>${s.tipo}</small><br>${s.testo}
                </div>
            `).join('');

            document.getElementById('stats-list').innerHTML = data.stats.map(st => `
                <div style="font-size:0.7em; margin-top:10px;">${st.label}</div>
                <div class="stat-bar"><div class="stat-fill" style="width:${st.valore*10}%; background:${st.color}"></div></div>
            `).join('');

            data.social_feed.forEach(p => {
                L.marker([p.lat, p.lon]).addTo(map).bindPopup(p.testo);
            });
        } catch (e) { console.log(e); }
    }
    fetchData();
    setInterval(fetchData, 60000);
</script>
</body>
</html>
