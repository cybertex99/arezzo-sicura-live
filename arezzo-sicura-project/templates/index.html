<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AREZZO SICURA - TOC</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --neon-red: #ff0000;
            --dark-bg: #050505;
            --panel-bg: rgba(15, 15, 15, 0.98);
            --accent-cyan: #00ffff;
        }

        body {
            background-color: var(--dark-bg);
            color: #d0d0d0;
            font-family: 'Orbitron', sans-serif; /* Se disponibile, altrimenti sans-serif */
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* TITOLO REIMPOSTATO */
        header {
            background: linear-gradient(90deg, #000, #200, #000);
            border-bottom: 3px solid var(--neon-red);
            padding: 15px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255,0,0,0.3);
        }

        header h1 {
            margin: 0; color: white; letter-spacing: 5px; font-size: 1.5em; text-shadow: 2px 2px #ff0000;
        }

        /* NEWS ANCORA PIÙ LENTE (400s) */
        .ticker-wrap { background: #300; height: 40px; overflow: hidden; display: flex; align-items: center; border-bottom: 1px solid #600; }
        .ticker-content {
            white-space: nowrap; display: inline-block; padding-left: 100%;
            animation: ticker 400s linear infinite; /* VELOCITÀ RIDOTTA DEL 200% RISPETTO A PRIMA */
            font-weight: bold; font-size: 1.2em; color: #ff9999;
        }

        @keyframes ticker { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-500%, 0, 0); } }

        .main-layout { display: grid; grid-template-columns: 350px 1fr 350px; flex-grow: 1; gap: 5px; padding: 5px; }
        .panel { background: var(--panel-bg); border: 1px solid #333; padding: 15px; overflow-y: auto; }
        .panel-title { color: var(--accent-cyan); border-bottom: 1px solid var(--accent-cyan); margin-bottom: 15px; padding-bottom: 5px; font-size: 0.8em; letter-spacing: 2px; }

        /* SOCIAL ITEM CON DATA E ORA */
        .feed-item { background: rgba(255,255,255,0.03); border: 1px solid #222; margin-bottom: 15px; padding: 10px; border-radius: 5px; }
        .feed-meta { display: flex; justify-content: space-between; font-size: 0.7em; color: var(--accent-cyan); margin-bottom: 5px; }

        /* VIE DI FUGA GRAFICA */
        .fuga-item { margin-bottom: 15px; }
        .fuga-header { display: flex; justify-content: space-between; font-size: 0.8em; margin-bottom: 5px; }
        .fuga-bar-bg { height: 12px; background: #222; border-radius: 6px; border: 1px solid #444; overflow: hidden; }
        .fuga-bar-fill { height: 100%; box-shadow: 0 0 10px rgba(0,255,0,0.5); }

        /* POLICE BUTTONS */
        .police-btn {
            display: block; width: 100%; padding: 10px; margin-top: 10px;
            background: #111; color: white; border: 1px solid #ff000044;
            text-decoration: none; text-align: center; font-size: 0.75em; border-radius: 3px;
        }
        .police-btn:hover { background: #300; border-color: var(--neon-red); }

        #map { background: #000; border: 1px solid #333; }
    </style>
</head>
<body>

<header>
    <h1>UNITÀ OPERATIVA: AREZZO SICURA</h1>
    <div style="font-size: 0.8em; color: #888;">SISTEMA AGGREGATORE CRIMINI E LOGISTICA | {{ data_oggi }}</div>
</header>

<div class="ticker-wrap">
    <div class="ticker-content" id="news-ticker">SINCRO IN CORSO... FILTRO CRIMINI ATTIVO...</div>
</div>

<div class="main-layout">
    <div class="panel">
        <div class="panel-title">ULTIME SEGNALAZIONI (FURTI/RAPINE)</div>
        <div id="social-list"></div>
    </div>

    <div id="map"></div>

    <div class="panel">
        <div class="panel-title">PROBABILITÀ VIE DI FUGA</div>
        <div id="stats-list"></div>

        <div class="panel-title" style="margin-top: 30px;">LINK RAPIDI FORZE ORDINE</div>
        <a href="https://www.carabinieri.it/" target="_blank" class="police-btn">CARABINIERI - Segnalazioni</a>
        <a href="https://www.poliziadistato.it/" target="_blank" class="police-btn">POLIZIA - Portale Sicurezza</a>
        <a href="tel:112" class="police-btn" style="background: #600; font-weight: bold; border-color: red;">SOS: CHIAMA 112</a>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: false }).setView([43.463, 11.878], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    async function update() {
        const res = await fetch('/api/updates');
        const data = await res.json();

        // News Lente
        document.getElementById('news-ticker').innerHTML = data.ticker_news.map(n => 
            ` [REPORT CRIMINE] 🚨 ${n.fonte}: ${n.titolo}`
        ).join(' +++ ');

        // Social con Data/Ora
        document.getElementById('social-list').innerHTML = data.social_feed.map(s => `
            <div class="feed-item">
                <div class="feed-meta"><span>${s.tipo} - ${s.comune}</span><span>${s.ora}</span></div>
                <div style="font-size:0.85em;">${s.testo}</div>
            </div>
        `).join('');

        // Vie di Fuga Grafica
        document.getElementById('stats-list').innerHTML = data.stats.map(st => `
            <div class="fuga-item">
                <div class="fuga-header"><span>${st.label}</span><span style="color:#0f0">${st.status}</span></div>
                <div class="fuga-bar-bg"><div class="fuga-bar-fill" style="width:${st.valore*10}%; background:linear-gradient(90deg, #003300, #00ff00)"></div></div>
            </div>
        `).join('');

        data.social_feed.forEach(p => {
            L.circleMarker([p.lat, p.lon], {color: 'red', radius: 8}).addTo(map).bindPopup(p.testo);
        });
    }
    update();
    setInterval(update, 60000);
</script>
</body>
</html>
